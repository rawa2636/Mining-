<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advertisement</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      background: transparent;
    }
  </style>
</head>
<body>
  <script>
    // Read parameters from the URL
    const params = new URLSearchParams(window.location.search);
    const key = params.get('key');
    const w = params.get('w');
    const h = params.get('h');

    if (key && w && h) {
      // Set Adsterra options
      window.atOptions = {
        'key': key,
        'format': 'iframe',
        'height': parseInt(h, 10),
        'width': parseInt(w, 10),
        'params': {}
      };
      
      // Inject the Adsterra script using document.write
      // This is safe here because it's an isolated HTML file, not a React component
      document.write('<script type="text/javascript" src="https://www.highperformanceformat.com/' + key + '/invoke.js"><\/script>');
    }
  </script>
</body>
</html>
